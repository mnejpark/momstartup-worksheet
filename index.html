<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>맘스타트업 창업 6단계 AI 워크시트</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F8F7FC;color:#1A1A1A}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.header{background:#7B2FBE;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(123,47,190,0.3)}
.header-inner{max-width:820px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px}
.badge{background:#E84500;color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.header-title{color:#fff;font-weight:700;font-size:14px;margin-left:10px}
.save-btn{padding:6px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.4);background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.tabs{background:#fff;border-bottom:2px solid #E0E0E0;position:sticky;top:54px;z-index:99;overflow-x:auto}
.tabs-inner{max-width:820px;margin:0 auto;display:flex;padding:0 12px}
.tab-btn{padding:10px 12px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:500;color:#666;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-2px;line-height:1.4;font-family:inherit}
.tab-btn.active{font-weight:700;border-bottom-color:var(--color)}
.content{max-width:820px;margin:0 auto;padding:20px 16px 80px}
.stage-hero{border-radius:14px;padding:18px 22px;margin-bottom:20px;border-left:4px solid var(--color)}
.stage-label{font-size:11px;font-weight:700;margin-bottom:3px}
.stage-title{font-size:20px;font-weight:800;margin-bottom:4px}
.stage-desc{font-size:13px;color:#666}
.progress-bar{width:100px;height:5px;background:#E0E0E0;border-radius:3px;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.ai-tip{background:#FFFDE7;border:1px solid #FFD54F;border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:#555;display:flex;gap:8px;align-items:flex-start}
.disc-banner{background:linear-gradient(135deg,#7B2FBE,#5A1F9A);border-radius:14px;padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 4px 16px rgba(123,47,190,0.25)}
.disc-banner-text{flex:1;min-width:200px}
.disc-banner-badge{font-size:11px;font-weight:800;color:#FFD0B5;letter-spacing:.08em;margin-bottom:4px}
.disc-banner-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px}
.disc-banner-sub{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.5}
.disc-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;text-decoration:none;background:#E84500;color:#fff;font-size:13px;font-weight:800;white-space:nowrap}
.disc-inline{background:#F0E8FF;border:1.5px solid #B39DDB;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.disc-inline-title{font-size:12px;font-weight:700;color:#7B2FBE;margin-bottom:3px}
.disc-inline-sub{font-size:13px;color:#666;line-height:1.5}
.disc-inline-link{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;text-decoration:none;background:#7B2FBE;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}
.section-card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #E0E0E0}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.section-question{font-size:14px;font-weight:600;color:#1A1A1A;line-height:1.5}
.ai-btn{flex-shrink:0;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:opacity .15s;font-family:inherit}
.ai-btn:disabled{background:#E0E0E0!important;cursor:not-allowed;opacity:.7}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.field-row{margin-bottom:12px}
.field-label{font-size:12px;font-weight:700;color:#444;margin-bottom:5px;display:flex;align-items:center;gap:6px}
textarea{width:100%;border-radius:8px;border:1.5px solid #E0E0E0;padding:10px 12px;font-size:14px;color:#1A1A1A;line-height:1.7;resize:vertical;outline:none;font-family:inherit;background:#FAFAFA;transition:border-color .15s}
textarea:focus{border-color:var(--fc,#7B2FBE);outline:none}
.ai-result{margin-top:14px;background:#F0E8FF;border:1.5px solid #B39DDB;border-radius:10px;padding:14px 16px}
.ai-result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ai-result-label{font-size:11px;font-weight:700;color:#7B2FBE;text-transform:uppercase;letter-spacing:.06em}
.ai-result-close{background:none;border:none;cursor:pointer;color:#666;font-size:16px;font-family:inherit}
.ai-result-text{font-size:13.5px;color:#1A1A1A;line-height:1.8;white-space:pre-wrap}
.ai-result-hint{margin-top:10px;font-size:12px;color:#666}
.nav-row{display:flex;justify-content:space-between;margin-top:10px;gap:10px}
.nav-prev{padding:10px 20px;border-radius:10px;border:1.5px solid #E0E0E0;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#1A1A1A;font-family:inherit}
.nav-prev:disabled{color:#ccc;cursor:not-allowed}
.nav-next{padding:10px 24px;border-radius:10px;border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.footer{text-align:center;margin-top:36px;font-size:12px;color:#999}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center">
      <span class="badge">맘스타트업</span>
      <span class="header-title">창업 6단계 AI 워크시트</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="tp" style="color:rgba(255,255,255,0.65);font-size:12px">0/0 완성</span>
      <button class="save-btn" onclick="saveFile()">저장</button>
    </div>
  </div>
</div>
<div class="tabs"><div class="tabs-inner" id="TC"></div></div>
<div class="content" id="MC"></div>
<script>
var DU="https://mnejpark.github.io/disc-test/";
var EP="/api/chat";
var V={};
var AS=0;
function mk(id,label,q,fields,ai,disc){return{id:id,label:label,q:q,fields:fields,ai:ai,disc:disc||false};}
function f(id,label,ph,rows){return{id:id,label:label,ph:ph||"작성해보세요...",rows:rows||2};}
var STAGES=[
  {id:1,label:"1단계",title:"가치관 재정립",color:"#7B2FBE",bg:"#F0E8FF",desc:"창업의 뿌리가 되는 나만의 가치관을 정립합니다",secs:[
    mk("s1a","가치관 질문 1","나는 지금 누구를 위해 살고 있나요?",[f("s1a1","나의 답변","자유롭게 적어보세요...",3)],function(g){return "이렇게 답했습니다: "+g("s1a1")+"\n\n창업 동기와 삶의 방향을 3문장으로 요약하고, 창업과 연결되는 한 줄을 써주세요.";}),
    mk("s1b","가치관 질문 2","나는 지금 무엇을 위해 살고 있나요?",[f("s1b1","나의 답변","자유롭게 적어보세요...",3)],function(g){return "이렇게 답했습니다: "+g("s1b1")+"\n\n창업과 연결될 수 있는 핵심 가치 키워드 3개를 뽑고 각각 한 줄로 설명해주세요.";}),
    mk("s1c","120세 시계 워크숍","내 나이 ÷ 5 = 현재 몇 시  (예: 40살 → 8시)",[f("s1c1","현재 내 나이","예) 42살",1),f("s1c2","120세 시계로 몇 시?","예) 8시",1),f("s1c3","남은 시간에 하고 싶은 것들","자유롭게 적어보세요...",4)],function(g){return "나이: "+g("s1c1")+" / 시계: "+g("s1c2")+"\n하고 싶은 것: "+g("s1c3")+"\n\n이 소망들과 창업을 연결해 2~3문장으로 구체적으로 써주세요.";}),
  ]},
  {id:2,label:"2단계",title:"나에 대해 깨닫기",color:"#E84500",bg:"#FFF3EF",desc:"자기 대화를 통해 강점을 발견하고 DISC 유형과 연결합니다",disc:true,secs:[
    mk("s2a","행복과 즐거움","당신은 당신과 대화해 본 적 있나요?",[f("s2a1","무엇을 할 때 제일 행복해?","",2),f("s2a2","무엇을 하며 시간 보낼 때 가장 즐거워?","",2)],null),
    mk("s2b","어려움과 분노","",[f("s2b1","무엇을 할 때 가장 참기 힘들어?","",2),f("s2b2","너는 언제 화가 나?","",2)],null),
    mk("s2c","사람과 자랑스러운 순간","",[f("s2c1","어떤 사람들과 있으면 행복해?","",2),f("s2c2","살면서 가장 자랑스러웠던 순간은?","",2)],null),
    mk("s2d","목표와 두려움","",[f("s2d1","너의 인생의 목표는 뭐야?","",2),f("s2d2","지금 가장 두려운 것은 무엇이야?","",2)],null),
    mk("s2e","나의 강점 2가지 질문","자존감 상승을 위한 핵심 질문",[f("s2e1","남들과 비교할 수 없는 나만의 장점은?","",3),f("s2e2","내가 가장 잘 할 수 있는 것은?","",3)],function(g){return "행복: "+g("s2a1")+" / 즐거움: "+g("s2a2")+" / 어려움: "+g("s2b1")+" / 목표: "+g("s2d1")+"\n장점: "+g("s2e1")+"\n잘하는 것: "+g("s2e2")+"\n\n위 내용을 종합해 창업 강점 3가지를 정리하고, 각각 창업에서 어떻게 활용할 수 있는지 한 줄씩 써주세요.";}),
    mk("s2f","DISC 유형 & 창업 강점 연결","DISC 진단 결과를 입력해보세요",[f("s2f1","내 DISC 유형 (D / I / S / C 중 선택)","예) I형",1),f("s2f2","이 유형의 창업 강점 (내 말로)","",3),f("s2f3","창업과 연결하면?","",2)],function(g){return "DISC 유형: "+g("s2f1")+"\n강점: "+g("s2f2")+"\n\nDISC 유형 특성을 바탕으로 창업 강점, 주의점, 잘 맞는 창업 분야 2가지를 구체적으로 알려주세요.";},true),
  ]},
  {id:3,label:"3단계",title:"아이템 만들기",color:"#7B2FBE",bg:"#F0E8FF",desc:"시네틱스 방법으로 나만의 창업 아이템을 도출합니다",secs:[
    mk("s3a","Vitamin vs Painkiller","내 아이디어는 어느 쪽인가요?",[f("s3a1","VITAMIN — 삶의 활력을 주는 아이디어 (Nice to Have)","예) 힐링 글쓰기 키트, 감성 공예 클래스",3),f("s3a2","PAINKILLER — 삶에 꼭 필요한 아이디어 (Must Have)","예) 경력단절 재취업 교육, 육아 정보 서비스",3)],null),
    mk("s3b","시네틱스 — AI 아이디어 생성","잘하는 것과 좋아하는 것을 입력하면 AI가 창업 아이디어 4가지를 만들어드려요!",[f("s3b1","내가 잘하는 것","예) 글쓰기, 요리, 디자인, 강의, 상담, 사진...",2),f("s3b2","내가 좋아하는 것","예) 커피, 여행, 독서, 아이들, 환경, 운동...",2)],function(g){return "예비 여성창업가의 강점과 관심사:\n잘하는 것: "+g("s3b1")+"\n좋아하는 것: "+g("s3b2")+"\n\n시네틱스(Synectics) 방법으로 창업 아이디어를 만들어주세요.\n\n먼저 트렌드·사회변화·일상에서 무작위 요소 3가지를 뽑고, 위 강점·관심사와 조합해 아이디어 4가지를 아래 형식으로 제안해주세요:\n\n[무작위 요소]\n1. \n2. \n3. \n\n아이디어 1: \n유형: Vitamin 또는 Painkiller\n한 줄 설명: \n시장성: 상/중/하\n\n아이디어 2: \n유형: \n한 줄 설명: \n시장성: \n\n아이디어 3: \n유형: \n한 줄 설명: \n시장성: \n\n아이디어 4: \n유형: \n한 줄 설명: \n시장성: \n\n추천 아이디어와 이유: ";}),
    mk("s3c","최종 선택 아이템","AI 제안을 참고해 최종 아이템을 선택하세요",[f("s3c1","선택한 아이템","",2),f("s3c2","선택 이유","",3)],function(g){return "선택 아이템: "+g("s3c1")+"\n이유: "+g("s3c2")+"\n\n이 아이템의 핵심 강점, 타깃 고객, 첫 번째 실행 단계 3가지를 응원하는 톤으로 알려주세요.";}),
  ]},
  {id:4,label:"4단계",title:"사업계획서 만들기",color:"#E84500",bg:"#FFF3EF",desc:"사업의 설계도인 사업계획서의 핵심을 작성합니다",secs:[
    mk("s4a","좋은 사업 기준 자가 체크","내 아이템은 어떤가요? 각 항목에 솔직하게 작성해보세요",[f("s4a1","① 경쟁력 — 나만의 차별점은?","",2),f("s4a2","② 지속력 — 반복 구매·이용 가능성은?","",2),f("s4a3","③ 명확한 가치제안 — 고객이 느끼는 핵심 가치는?","",2),f("s4a4","④ 수익구조 선순환 — 돈이 돌아오는 구조는?","",2),f("s4a5","⑤ 모방 불가능성 — 나만이 할 수 있는 이유는?","",2)],null),
    mk("s4b","수익구조 필수 9가지 요소","비즈니스 모델의 핵심 9가지를 채워보세요",[f("s4b1","① 가치제안 — 고객에게 어떤 가치를 줄 것인가?","",2),f("s4b2","② 고객 — 누구에게 팔 것인가?","",2),f("s4b3","③ 홍보 — 어떻게 알릴 것인가?","",2),f("s4b4","④ 판매채널 — 어디서, 어떻게 판매할 것인가?","",2),f("s4b5","⑤ 매출방식 — 어떻게 수익을 낼 것인가?","",2),f("s4b6","⑥ 핵심자원 — 어떤 자원이 필요한가?","",2),f("s4b7","⑦ 핵심활동 — 사업 유지를 위한 핵심 활동은?","",2),f("s4b8","⑧ 핵심파트너 — 협력해야 할 외부 파트너는?","",2),f("s4b9","⑨ 비용 — 운영에 필요한 주요 비용 항목은?","",2)],function(g){return "아이템: "+g("s3c1")+"\n①가치제안: "+g("s4b1")+"\n②고객: "+g("s4b2")+"\n③홍보: "+g("s4b3")+"\n④채널: "+g("s4b4")+"\n⑤매출: "+g("s4b5")+"\n⑥자원: "+g("s4b6")+"\n⑦활동: "+g("s4b7")+"\n⑧파트너: "+g("s4b8")+"\n⑨비용: "+g("s4b9")+"\n\n빠진 부분을 채우고 각 요소를 더 구체적으로 발전시켜주세요. ①~⑨ 번호 형식 그대로 답변해주세요.";}),
    mk("s4c","정부지원사업 신청 계획","단계별 정부지원사업을 활용해보세요",[f("s4c1","관심 있는 지원사업","예) 예비창업패키지, 초기창업패키지...",2),f("s4c2","신청 이유","",2),f("s4c3","준비할 것","",2)],function(g){return "관심 지원사업: "+g("s4c1")+"\n아이템: "+g("s3c1")+"\n\n이 지원사업 신청을 위한 준비 체크리스트와 신청 시 강조할 포인트를 알려주세요.";}),
