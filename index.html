<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>맘스타트업 창업 6단계 AI 워크시트</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F8F7FC;color:#1A1A1A}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.header{background:#7B2FBE;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(123,47,190,0.3)}
.header-inner{max-width:820px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px}
.badge{background:#E84500;color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.header-title{color:#fff;font-weight:700;font-size:14px;margin-left:10px}
.save-btn{padding:6px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.4);background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.tabs{background:#fff;border-bottom:2px solid #E0E0E0;position:sticky;top:54px;z-index:99;overflow-x:auto}
.tabs-inner{max-width:820px;margin:0 auto;display:flex;padding:0 12px}
.tab-btn{padding:10px 12px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:500;color:#666;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-2px;line-height:1.4;font-family:inherit}
.tab-btn.active{font-weight:700;border-bottom-color:var(--color)}
.content{max-width:820px;margin:0 auto;padding:20px 16px 80px}
.stage-hero{border-radius:14px;padding:18px 22px;margin-bottom:20px;border-left:4px solid var(--color)}
.stage-label{font-size:11px;font-weight:700;margin-bottom:3px}
.stage-title{font-size:20px;font-weight:800;margin-bottom:4px}
.stage-desc{font-size:13px;color:#666}
.progress-bar{width:100px;height:5px;background:#E0E0E0;border-radius:3px;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.ai-tip{background:#FFFDE7;border:1px solid #FFD54F;border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:#555;display:flex;gap:8px;align-items:flex-start}
.disc-banner{background:linear-gradient(135deg,#7B2FBE,#5A1F9A);border-radius:14px;padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 4px 16px rgba(123,47,190,0.25)}
.disc-banner-text{flex:1;min-width:200px}
.disc-banner-badge{font-size:11px;font-weight:800;color:#FFD0B5;letter-spacing:.08em;margin-bottom:4px}
.disc-banner-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px}
.disc-banner-sub{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.5}
.disc-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;text-decoration:none;background:#E84500;color:#fff;font-size:13px;font-weight:800;white-space:nowrap}
.disc-inline{background:#F0E8FF;border:1.5px solid #B39DDB;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.disc-inline-title{font-size:12px;font-weight:700;color:#7B2FBE;margin-bottom:3px}
.disc-inline-sub{font-size:13px;color:#666;line-height:1.5}
.disc-inline-link{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;text-decoration:none;background:#7B2FBE;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}
.section-card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #E0E0E0}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.section-question{font-size:14px;font-weight:600;color:#1A1A1A;line-height:1.5}
.ai-btn{flex-shrink:0;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:opacity .15s;font-family:inherit}
.ai-btn:disabled{background:#E0E0E0!important;cursor:not-allowed;opacity:.7}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.field-row{margin-bottom:12px}
.field-label{font-size:12px;font-weight:700;color:#444;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.field-num{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
textarea{width:100%;border-radius:8px;border:1.5px solid #E0E0E0;padding:10px 12px;font-size:14px;color:#1A1A1A;line-height:1.7;resize:vertical;outline:none;font-family:inherit;background:#FAFAFA;transition:border-color .15s}
textarea:focus{border-color:var(--focus-color,#7B2FBE)}
.field-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ai-result{margin-top:14px;background:#F0E8FF;border:1.5px solid #B39DDB;border-radius:10px;padding:14px 16px}
.ai-result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ai-result-label{font-size:11px;font-weight:700;color:#7B2FBE;text-transform:uppercase;letter-spacing:.06em}
.ai-result-close{background:none;border:none;cursor:pointer;color:#666;font-size:16px;font-family:inherit}
.ai-result-text{font-size:13.5px;color:#1A1A1A;line-height:1.8;white-space:pre-wrap}
.ai-result-hint{margin-top:10px;font-size:12px;color:#666}
.nav-row{display:flex;justify-content:space-between;margin-top:10px;gap:10px}
.nav-prev{padding:10px 20px;border-radius:10px;border:1.5px solid #E0E0E0;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#1A1A1A;font-family:inherit}
.nav-prev:disabled{color:#ccc;cursor:not-allowed}
.nav-next{padding:10px 24px;border-radius:10px;border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.footer{text-align:center;margin-top:36px;font-size:12px;color:#999}
@media(max-width:600px){.field-pair{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center">
      <span class="badge">맘스타트업</span>
      <span class="header-title">창업 6단계 AI 워크시트</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="total-progress" style="color:rgba(255,255,255,0.65);font-size:12px">0/0 완성</span>
      <button class="save-btn" onclick="saveFile()">↓ 저장</button>
    </div>
  </div>
</div>
<div class="tabs"><div class="tabs-inner" id="tabs-container"></div></div>
<div class="content" id="main-content"></div>
<script>
var DISC_URL="https://mnejpark.github.io/disc-test/";
var API_ENDPOINT="/api/chat";
var values={};

var STAGES=[
  {id:1,label:"1단계",title:"가치관 재정립",color:"#7B2FBE",lightBg:"#F0E8FF",desc:"창업의 뿌리가 되는 나만의 가치관을 정립합니다",
    sections:[
      {id:"s1q1",label:"가치관 질문 1",question:"나는 지금 누구를 위해 살고 있나요?",
        fields:[{id:"s1q1_a",label:"나의 답변",ph:"자유롭게 적어보세요...",rows:3}],
        ai:function(g){return '이렇게 답했습니다: "'+g("s1q1_a")+'"\n\n창업 동기와 삶의 방향을 3문장으로 요약하고, 창업과 연결되는 한 줄을 써주세요.';}},
      {id:"s1q2",label:"가치관 질문 2",question:"나는 지금 무엇을 위해 살고 있나요?",
        fields:[{id:"s1q2_a",label:"나의 답변",ph:"자유롭게 적어보세요...",rows:3}],
        ai:function(g){return '이렇게 답했습니다: "'+g("s1q2_a")+'"\n\n창업과 연결될 수 있는 핵심 가치 키워드 3개를 뽑고 각각 한 줄로 설명해주세요.';}},
      {id:"s1clock",label:"120세 시계 워크숍",question:"내 나이 ÷ 5 = 현재 몇 시  (예: 40살 → 8시)",
        fields:[
          {id:"s1clock_age",label:"내 나이",ph:"예) 42살",rows:1},
          {id:"s1clock_time",label:"120세 시계로 몇 시?",ph:"예) 8시 (= 42 ÷ 5 ≈ 8)",rows:1},
          {id:"s1clock_wish",label:"남은 시간에 하고 싶은 것들",ph:"자유롭게 적어보세요...",rows:4}
        ],
        ai:function(g){return '나이: '+g("s1clock_age")+' / 시계: '+g("s1clock_time")+'\n하고 싶은 것: '+g("s1clock_wish")+'\n\n이 소망들과 창업을 연결해 2~3문장으로 구체적으로 써주세요.';}},
    ]},

  {id:2,label:"2단계",title:"나에 대해 깨닫기",color:"#E84500",lightBg:"#FFF3EF",desc:"자기 대화를 통해 강점을 발견하고 DISC 유형과 연결합니다",discBanner:true,
    sections:[
      {id:"s2q1",label:"행복과 즐거움",question:"당신은 당신과 대화해 본 적 있나요?",
        fields:[
          {id:"s2q1_a",label:"무엇을 할 때 제일 행복해?",ph:"",rows:2},
          {id:"s2q1_b",label:"무엇을 하며 시간 보낼 때 가장 즐거워?",ph:"",rows:2}
        ],ai:null},
      {id:"s2q2",label:"어려움과 분노",question:"",
        fields:[
          {id:"s2q2_a",label:"무엇을 할 때 가장 참기 힘들어?",ph:"",rows:2},
          {id:"s2q2_b",label:"너는 언제 화가 나?",ph:"",rows:2}
        ],ai:null},
      {id:"s2q3",label:"사람과 자랑스러운 순간",question:"",
        fields:[
          {id:"s2q3_a",label:"어떤 사람들과 있으면 행복해?",ph:"",rows:2},
          {id:"s2q3_b",label:"살면서 가장 자랑스러웠던 순간은?",ph:"",rows:2}
        ],ai:null},
      {id:"s2q4",label:"목표와 두려움",question:"",
        fields:[
          {id:"s2q4_a",label:"너의 인생의 목표는 뭐야?",ph:"",rows:2},
          {id:"s2q4_b",label:"지금 가장 두려운 것은 무엇이야?",ph:"",rows:2}
        ],ai:null},
      {id:"s2str",label:"나의 강점 2가지 질문",question:"자존감 상승을 위한 핵심 질문",
        fields:[
          {id:"s2str_a",label:"남들과 비교할 수 없는 나만의 장점은?",ph:"",rows:3},
          {id:"s2str_b",label:"내가 가장 잘 할 수 있는 것은?",ph:"",rows:3}
        ],
        ai:function(g){
          var ctx="행복: "+g("s2q1_a")+" / 즐거움: "+g("s2q1_b")+" / 어려움: "+g("s2q2_a")+" / 목표: "+g("s2q4_a");
          return "자기 성찰 내용:\n"+ctx+"\n장점: "+g("s2str_a")+"\n잘하는 것: "+g("s2str_b")+"\n\n위 내용을 종합해 창업 강점 3가지를 정리하고, 각각 창업에서 어떻게 활용할 수 있는지 한 줄씩 써주세요.";
        }},
      {id:"s2disc",label:"DISC 유형 & 창업 강점 연결",question:"DISC 진단 결과를 입력해보세요",disc:true,
        fields:[
          {id:"s2disc_type",label:"내 DISC 유형 (D / I / S / C 중 선택)",ph:"예) I형",rows:1},
          {id:"s2disc_str",label:"이 유형의 창업 강점 (내 말로)",ph:"",rows:3},
          {id:"s2disc_link",label:"창업과 연결하면?",ph:"",rows:2}
        ],
        ai:function(g){return 'DISC 유형: '+g("s2disc_type")+'\n강점: '+g("s2disc_str")+'\n\nDISC 유형 특성을 바탕으로 창업 강점, 주의점, 잘 맞는 창업 분야 2가지를 구체적으로 알려주세요.';}},
    ]},

  {id:3,label:"3단계",title:"아이템 만들기",color:"#7B2FBE",lightBg:"#F0E8FF",desc:"시네틱스 방법으로 나만의 창업 아이템을 도출합니다",
    sections:[
      {id:"s3vp",label:"Vitamin vs Painkiller",question:"내 아이디어는 어느 쪽인가요?",
        fields:[
          {id:"s3vp_v",label:"VITAMIN — 삶의 활력을 주는 아이디어 (Nice to Have)",ph:"예) 힐링 글쓰기 키트, 감성 공예 클래스",rows:3},
          {id:"s3vp_p",label:"PAINKILLER — 삶에 꼭 필요한 아이디어 (Must Have)",ph:"예) 경력단절 재취업 교육, 육아 정보 서비스",rows:3}
        ],ai:null},
      {id:"s3syn",label:"시네틱스 — AI 아이디어 생성",question:"잘하는 것과 좋아하는 것을 입력하면 AI가 창업 아이디어 4가지를 만들어드려요!",
        fields:[
          {id:"s3syn_a",label:"내가 잘하는 것",ph:"예) 글쓰기, 요리, 디자인, 강의, 상담, 사진...",rows:2},
          {id:"s3syn_b",label:"내가 좋아하는 것",ph:"예) 커피, 여행, 독서, 아이들, 환경, 운동...",rows:2}
        ],
        ai:function(g){return "예비 여성창업가의 강점과 관심사:\n잘하는 것: "+g("s3syn_a")+"\n좋아하는 것: "+g("s3syn_b")+"\n\n시네틱스(Synectics) 방법으로 창업 아이디어를 만들어주세요.\n\n먼저 트렌드·사회변화·일상에서 무작위 요소 3가지를 뽑고, 위 강점·관심사와 조합해 아이디어 4가지를 아래 형식으로 제안해주세요:\n\n[무작위 요소]\n1. \n2. \n3. \n\n아이디어 1: \n유형: Vitamin 또는 Painkiller\n한 줄 설명: \n시장성: 상/중/하\n\n아이디어 2: \n유형: \n한 줄 설명: \n시장성: \n\n아이디어 3: \n유형: \n한 줄 설명: \n시장성: \n\n아이디어 4: \n유형: \n한 줄 설명: \n시장성: \n\n추천 아이디어와 이유: ";}},
      {id:"s3final",label:"최종 선택 아이템",question:"AI 제안을 참고해 최종 아이템을 선택하세요",
        fields:[
          {id:"s3final_item",label:"선택한 아이템",ph:"",rows:2},
          {id:"s3final_why",label:"선택 이유",ph:"",rows:3}
        ],
        ai:function(g){return '선택 아이템: "'+g("s3final_item")+'"\n이유: '+g("s3final_why")+'\n\n이 아이템의 핵심 강점, 타깃 고객, 첫 번째 실행 단계 3가지를 응원하는 톤으로 알려주세요.';}},
    ]},

  {id:4,label:"4단계",title:"사업계획서 만들기",color:"#E84500",lightBg:"#FFF3EF",desc:"사업의 설계도인 사업계획서의 핵심을 작성합니다",
    sections:[
      {id:"s4biz",label:"좋은 사업 기준 자가 체크",question:"내 아이템은 어떤가요? 각 항목에 솔직하게 작성해보세요",
        fields:[
          {id:"s4biz_1",label:"① 경쟁력 — 나만의 차별점은?",ph:"",rows:2},
          {id:"s4biz_2",label:"② 지속력 — 반복 구매·이용 가능성은?",ph:"",rows:2},
          {id:"s4biz_3",label:"③ 명확한 가치제안 — 고객이 느끼는 핵심 가치는?",ph:"",rows:2},
          {id:"s4biz_4",label:"④ 수익구조 선순환 — 돈이 돌아오는 구조는?",ph:"",rows:2},
          {id:"s4biz_5",label:"⑤ 모방 불가능성 — 나만이 할 수 있는 이유는?",ph:"",rows:2}
        ],ai:null},
      {id:"s4nine",label:"수익구조 필수 9가지 요소",question:"비즈니스 모델의 핵심 9가지를 채워보세요",
        fields:[
          {id:"s4nine_1",label:"① 가치제안 — 고객에게 어떤 가치를 줄 것인가?",ph:"",rows:2},
          {id:"s4nine_2",label:"② 고객 — 누구에게 팔 것인가?",ph:"",rows:2},
          {id:"s4nine_3",label:"③ 홍보 — 어떻게 알릴 것인가?",ph:"",rows:2},
          {id:"s4nine_4",label:"④ 판매채널 — 어디서, 어떻게 판매할 것인가?",ph:"",rows:2},
          {id:"s4nine_5",label:"⑤ 매출방식 — 어떻게 수익을 낼 것인가?",ph:"",rows:2},
          {id:"s4nine_6",label:"⑥ 핵심자원 — 어떤 자원(사람·장비·공간)이 필요한가?",ph:"",rows:2},
          {id:"s4nine_7",label:"⑦ 핵심활동 — 사업 유지를 위한 핵심 활동은?",ph:"",rows:2},
          {id:"s4nine_8",label:"⑧ 핵심파트너 — 협력해야 할 외부 파트너는?",ph:"",rows:2},
          {id:"s4nine_9",label:"⑨ 비용 — 운영에 필요한 주요 비용 항목은?",ph:"",rows:2}
        ],
        ai:function(g){
          var item=g("s3final_item");
          var content="①가치제안: "+g("s4nine_1")+"\n②고객: "+g("s4nine_2")+"\n③홍보: "+g("s4nine_3")+"\n④채널: "+g("s4nine_4")+"\n⑤매출: "+g("s4nine_5")+"\n⑥자원: "+g("s4nine_6")+"\n⑦활동: "+g("s4nine_7")+"\n⑧파트너: "+g("s4nine_8")+"\n⑨비용: "+g("s4nine_9");
          return "아이템: "+item+"\n\n작성 내용:\n"+content+"\n\n빠진 부분을 채우고 각 요소를 더 구체적으로 발전시켜주세요. ①~⑨ 번호 형식 그대로 답변해주세요.";
        }},

function getFieldIds(sec){
  var ids=[];
  if(sec.fields){sec.fields.forEach(function(f){ids.push(f.id);});}
  else{ids.push(sec.id);}
  return ids;
}

function getTotalCounts(){
  var f=0,t=0;
  STAGES.forEach(function(st){
    st.sections.forEach(function(sec){
      getFieldIds(sec).forEach(function(id){t++;if((values[id]||"").trim())f++;});
    });
  });
  return{filled:f,total:t};
}

function getStageCounts(st){
  var f=0,t=0;
  st.sections.forEach(function(sec){
    getFieldIds(sec).forEach(function(id){t++;if((values[id]||"").trim())f++;});
  });
  return{filled:f,total:t};
}

var activeStage=0;

function renderTabs(){
  var c=document.getElementById("tabs-container");c.innerHTML="";
  STAGES.forEach(function(st,i){
    var r=getStageCounts(st);var done=r.filled===r.total&&r.total>0;
    var btn=document.createElement("button");
    btn.className="tab-btn"+(i===activeStage?" active":"");
    btn.style.setProperty("--color",st.color);
    btn.innerHTML='<div style="display:flex;align-items:center;gap:4px">'+(done?'<span style="color:#1B8A4C;font-size:10px">✓</span> ':'')+st.label+'</div><div style="font-size:9.5px;opacity:.75;margin-top:1px">'+st.title+'</div>';
    btn.onclick=function(){activeStage=i;render();};
    c.appendChild(btn);
  });
}

function renderContent(){
  var st=STAGES[activeStage];
  var r=getStageCounts(st);
  var pct=r.total>0?Math.round(r.filled/r.total*100):0;
  var html='<div class="stage-hero" style="background:'+st.lightBg+';--color:'+st.color+'">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">';
  html+='<div><div class="stage-label" style="color:'+st.color+'">'+st.label+'</div><div class="stage-title">'+st.title+'</div><div class="stage-desc">'+st.desc+'</div></div>';
  html+='<div style="text-align:right"><div style="font-size:11px;color:#666;margin-bottom:5px">'+r.filled+'/'+r.total+' 완성</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+st.color+'"></div></div></div>';
  html+='</div></div>';
  html+='<div class="ai-tip"><span style="font-size:15px;flex-shrink:0">✦</span><span>각 항목을 작성한 후 <b>AI 도움받기</b>를 누르면 Claude가 맞춤 제안을 드립니다!</span></div>';
  if(st.discBanner){
    html+='<div class="disc-banner"><div class="disc-banner-text"><div class="disc-banner-badge">2단계 시작 전 필수</div><div class="disc-banner-title">DISC 창업가 유형 진단을 먼저 해보세요!</div><div class="disc-banner-sub">진단 결과를 가지고 돌아와 작성하면 훨씬 정확해요</div></div><a href="'+DISC_URL+'" target="_blank" class="disc-link">진단하러 가기 →</a></div>';
  }
  st.sections.forEach(function(sec){
    html+='<div class="section-card">';
    html+='<div class="section-head"><div style="flex:1"><div class="section-label" style="color:'+st.color+'">'+sec.label+'</div>';
    if(sec.question){html+='<div class="section-question">'+sec.question+'</div>';}
    html+='</div>';
    if(sec.ai){html+='<button class="ai-btn" style="background:'+st.color+'" onclick="askAI(\''+sec.id+'\')" id="aibtn-'+sec.id+'">✦ AI 도움받기</button>';}
    html+='</div>';
    if(sec.disc){html+='<div class="disc-inline"><div><div class="disc-inline-title">DISC 창업 행동유형 진단</div><div class="disc-inline-sub">아직 진단을 안 하셨나요?</div></div><a href="'+DISC_URL+'" target="_blank" class="disc-inline-link">↗ DISC 진단하기</a></div>';}

    if(sec.fields){
      sec.fields.forEach(function(field){
        html+='<div class="field-row">';
        html+='<div class="field-label"><span style="background:'+st.color+';width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0"></span> '+field.label+'</div>';
        html+='<textarea rows="'+(field.rows||2)+'" placeholder="'+(field.ph||'작성해보세요...')+'" style="--focus-color:'+st.color+'" oninput="updateVal(\''+field.id+'\',this.value)">'+(values[field.id]||'')+'</textarea>';
        html+='</div>';
      });
    }
    html+='<div id="airesult-'+sec.id+'" style="display:none"></div></div>';
  });
  html+='<div class="nav-row">';
  html+='<button class="nav-prev" onclick="goStage('+(activeStage-1)+')" '+(activeStage===0?"disabled":"")+'>← 이전 단계</button>';
  if(activeStage<STAGES.length-1){html+='<button class="nav-next" style="background:'+st.color+'" onclick="goStage('+(activeStage+1)+')">다음 단계 →</button>';}
  else{html+='<button class="nav-next" style="background:#1B8A4C" onclick="saveFile()">완성! 저장하기 ↓</button>';}
  html+='</div><div class="footer">ⓒ 창업멘토 박은정 · ㈜이제이임팩트 · @eco_business_creator</div>';
  document.getElementById("main-content").innerHTML=html;
}

function render(){renderTabs();renderContent();var r=getTotalCounts();document.getElementById("total-progress").textContent=r.filled+"/"+r.total+" 완성";}

function updateVal(id,val){values[id]=val;var r=getTotalCounts();document.getElementById("total-progress").textContent=r.filled+"/"+r.total+" 완성";renderTabs();}

function goStage(i){if(i<0||i>=STAGES.length)return;activeStage=i;render();window.scrollTo({top:0,behavior:"smooth"});}

function getVal(id){return values[id]||"";}

async function askAI(secId){
  var st=STAGES[activeStage];
  var sec=null;
  for(var i=0;i<st.sections.length;i++){if(st.sections[i].id===secId){sec=st.sections[i];break;}}
  if(!sec||!sec.ai)return;

  var hasContent=false;
  if(sec.fields){sec.fields.forEach(function(f){if((values[f.id]||"").trim())hasContent=true;});}
  else{if((values[secId]||"").trim())hasContent=true;}
  if(!hasContent){alert("먼저 내용을 입력해주세요!");return;}

  var btn=document.getElementById("aibtn-"+secId);
  var resultDiv=document.getElementById("airesult-"+secId);
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> 생성 중';
  resultDiv.style.display="none";

  var prompt=sec.ai(getVal);

  try{
    var res=await fetch(API_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1200,
        system:"당신은 여성창업가를 위한 따뜻하고 실용적인 창업 멘토입니다. 박은정 창업멘토의 맘스타트업 창업 6단계 방법론을 기반으로, 구체적이고 실행 가능한 한국어 조언을 해주세요.",
        messages:[{role:"user",content:prompt}]
      })
    });
    var data=await res.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||"응답을 받지 못했습니다.";
    resultDiv.innerHTML='<div class="ai-result"><div class="ai-result-head"><span class="ai-result-label">✦ Claude 응답</span><button class="ai-result-close" onclick="document.getElementById(\'airesult-'+secId+'\').style.display=\'none\'">✕</button></div><div class="ai-result-text">'+text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div><div class="ai-result-hint">위 내용을 참고해 각 입력란에 직접 작성해보세요 ↑</div></div>';
    resultDiv.style.display="block";
  }catch(e){alert("오류: "+e.message);}
  finally{btn.disabled=false;btn.innerHTML="✦ AI 도움받기";}
}

function saveFile(){
  var content="";
  STAGES.forEach(function(st){
    content+="========================================\n"+st.label+" · "+st.title+"\n========================================\n";
    st.sections.forEach(function(sec){
      content+="【"+sec.label+"】\n";
      if(sec.fields){
        sec.fields.forEach(function(f){content+=f.label+":\n"+(values[f.id]||"(미작성)")+"\n\n";});
      }else{
        content+=(values[sec.id]||"(미작성)")+"\n\n";
      }
    });
    content+="\n";
  });
  var blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="맘스타트업_6단계_워크시트.txt";a.click();
  URL.revokeObjectURL(url);
}

render();
